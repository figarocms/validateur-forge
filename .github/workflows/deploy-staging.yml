  name: Deploy to Cloud Run (Staging)
  
  on:
    push:
      branches: [master]
  
  env:
    PROJECT_NUMBER: 140750957422
    PROJECT_ID: project-staging1
    REGION: europe-west1
    SERVICE_NAME: validateur-forge
    REPO_NAME: github-action-repo
    IMAGE_NAME: validateur-forge
  
  jobs:
    deploy:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write
  
      steps:
        - uses: actions/checkout@v4
  
        - id: auth
          uses: google-github-actions/auth@v2
          with:
            workload_identity_provider: >-
              projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
            service_account: vibecoding-deploy@project-staging1.iam.gserviceaccount.com
  
        - uses: google-github-actions/setup-gcloud@v2
  
        - name: Configure Docker for Artifact Registry
          run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
  
        - name: Build & Push Docker image
          run: |
            IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker build -t $IMAGE .
            docker push $IMAGE
  
        - name: Deploy to Cloud Run
          uses: google-github-actions/deploy-cloudrun@v2
          with:
            service: ${{ env.SERVICE_NAME }}
            region: ${{ env.REGION }}
            image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            service_account: vibecoding-deploy@project-staging1.iam.gserviceaccount.com
            flags: |
              --network=staging
              --subnet=net-staging 
              --vpc-egress=all-traffic
              --ingress=internal-and-cloud-load-balancing
              --memory=512Mi
              --cpu=1
              --min-instances=0
              --max-instances=3
              --port=3000
            env_vars: |
              NUXT_API_KEY=TOTO
              NUXT_API_BASE_URL_PROD=https://explorimmobox.explorimmo.com/v2/listings.json
              NUXT_API_BASE_URL_INTEG=https://imb-integration.vip.adencf.local/v2/listings.json
